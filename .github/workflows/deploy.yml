name: Deploy Flask App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install -r flask-demo/requirements.txt
      
      - name: Run tests
        run: |
          echo "Testing Flask app..."
          # 簡單測試：檢查語法
          python -m py_compile flask-demo/app.py
          echo "✅ Syntax OK"
      
      - name: Deploy (範例)
        run: |
          echo "🚀 Deploying to server..."
          # 這裡可以加上部署指令
          # 例如: scp, rsync, 或 API call
          echo "Done!"
